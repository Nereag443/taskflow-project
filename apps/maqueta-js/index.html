<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>To Do List App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>To Do List</h1>
    </header>

    <main>
      <aside>
        <h2>Opciones</h2>
        <ul>
          <li><a href="#usuario">👤 Usuario</a></li>
          <li><a href="#tareas">📋 Tareas</a></li>
          <li><a href="#calendario">📅 Calendario</a></li>
          <li><a href="#configuración">⚙ Configuración</a></li>

        </ul>
      </aside>

      <section class="main-section" id="tareas">

        <div id="task-finder">
          <h2>Tareas</h2>
        <section>
          <input type="text" id="finder-text" placeholder="Búsca una tarea">
          <button type="button" id="search-task">🔍</button>
        </section>
        </div>
      
        <div id="task-block"></div>

        <section class="h1-contenteditable" id="task-input">
          <header>
            <input type="text" id="task-text"placeholder="Añade una tarea" />
            <button type="button" id="add-task-button">Aceptar</button >
          </header>
          
        </section>
      </section>

      <script src="app.js"></script>
    </main>
  </body>
</html>
